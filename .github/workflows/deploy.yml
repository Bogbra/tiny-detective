name: Deploy

# Chained off CI's completion (not re-running the checks here) so a broken
# build never reaches Cloud Run/Hosting — "do not deploy if checks fail".
# workflow_run always reads this file from the default branch, so the very
# first push that adds this workflow won't retroactively fire from the CI
# run that just happened; workflow_dispatch exists for that bootstrap case
# and for any future ad-hoc redeploy.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  # One workflow, two jobs (needs: for ordering) instead of two separate
  # workflow_run-chained files — a 3-deep trigger chain (CI -> deploy-api ->
  # deploy-web) adds fragility that isn't earning its keep at this project's
  # size: harder to debug, and a broken link is easy to miss in the Actions
  # UI. See docs/architecture-decisions/ADR-0006.
  deploy-api:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    outputs:
      api_url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v3

      - name: Build and push image
        run: |
          gcloud auth configure-docker "${{ vars.GCP_REGION }}-docker.pkg.dev" --quiet
          IMAGE="${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/tiny-detective-api/api:${{ github.sha }}"
          docker build -f services/api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_ENV"

      # --max-instances bounds a traffic spike (the public /hint endpoint
      # calls OpenAI on every request); --min-instances=0 is explicit, not
      # left at the default, because a demo should actually scale to zero
      # when idle — cold starts don't matter here, a running instance with
      # no traffic does.
      #
      # --timeout=120s (Cloud Run's default is also 300s, but leaving it
      # implicit meant nobody had actually reasoned about it against this
      # service's real worst case): /cases/generate's retry loop makes up
      # to 5 attempts, each up to 3 real OpenAI calls (render, logic judge,
      # safety judge), each with its own 30s client-side timeout (see
      # openai_client.py, task 6) — a genuine worst case of several
      # minutes if every single call happened to hang at its max. 120s is
      # generous versus the real observed latency (single-digit seconds
      # per attempt in practice) while still bounding how long one stuck
      # request can hold a slot open.
      #
      # --concurrency=40, not Cloud Run's default of 80: every route
      # except POST /cases/generate is a plain `def` (sync) FastAPI route,
      # which FastAPI runs via Starlette's run_in_threadpool — backed by
      # anyio's default CapacityLimiter, which caps concurrent threads at
      # 40 per process. Leaving --concurrency at 80 would let Cloud Run
      # believe an instance has room for 80 concurrent requests while the
      # 41st sync request onward actually queues invisibly on that thread
      # pool inside the container — inflating tail latency without ever
      # showing up as autoscaler-visible pressure, since Cloud Run's own
      # concurrency counter never gets close to its configured limit.
      # Aligning --concurrency with the real threadpool capacity makes
      # Cloud Run's autoscaling decisions reflect what the container can
      # actually do.
      - id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: tiny-detective-api
          region: ${{ vars.GCP_REGION }}
          project_id: ${{ vars.GCP_PROJECT_ID }}
          image: ${{ env.image }}
          flags: >-
            --allow-unauthenticated
            --service-account=${{ vars.RUNTIME_SA_EMAIL }}
            --max-instances=3
            --min-instances=0
            --timeout=120s
            --concurrency=40
            --set-env-vars=GOOGLE_CLOUD_PROJECT=${{ vars.GCP_PROJECT_ID }},ALLOWED_ORIGINS=https://${{ vars.GCP_PROJECT_ID }}.web.app,REQUIRE_PERSISTENT_STORAGE=true
            --set-secrets=ADMIN_API_TOKEN=ADMIN_API_TOKEN:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest

      - name: Deploy Firestore rules and indexes
        run: |
          npm install -g firebase-tools@15
          firebase deploy --only firestore:rules,firestore:indexes --project="${{ vars.GCP_PROJECT_ID }}" --non-interactive

      - name: Smoke test /health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.url }}/health")
          if [ "$status" != "200" ]; then
            echo "Health check failed: got $status"
            exit 1
          fi

  deploy-web:
    needs: deploy-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/game
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6

      - run: flutter pub get
      - run: flutter build web --release --dart-define=API_BASE_URL=${{ needs.deploy-api.outputs.api_url }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.GCP_PROJECT_ID }}
          channelId: live
